version: '3.8'

services:
  # TaskManager Application (Development)
  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: taskmanager-dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/taskmanager.db
      - DEBUG=true
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    command: uvicorn src.taskmanager.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    depends_on:
      - db

  # Database Service (SQLite for development)
  db:
    image: postgres:15-alpine
    container_name: taskmanager-db-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=taskmanager
      - POSTGRES_USER=taskmanager
      - POSTGRES_PASSWORD=taskmanager_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  default:
    name: taskmanager-dev-network